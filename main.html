<head>
    <meta charset="UTF-8">

    <title>DTK - Main</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #eef2f5;
            display: flex;
            flex-direction: column;
        }

        /* 頂部工具列 */
        .toolbar {
            background-color: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 20;
            flex-shrink: 0;
        }

        .time-display {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1;
        }

        .toolbar-msg {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4c4c;
            font-weight: bold;
            font-size: 1rem;
            white-space: nowrap;
            z-index: 0;
            transition: opacity 0.3s;
        }

        .auth-area {
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }

        .auth-area input[type="text"],
        .auth-area input[type="password"] {
            padding: 6px 10px;
            font-size: 0.9rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            width: 120px;
        }

        .username-display {
            font-size: 1rem;
            color: #4CAF50;
            font-weight: bold;
            margin-right: 10px;
        }

        button {
            padding: 6px 15px;
            font-size: 0.9rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login { background-color: #007bff; color: white; }
        .btn-login:hover { background-color: #0056b3; }
        .btn-logout { background-color: #dc3545; color: white; }
        .btn-logout:hover { background-color: #c82333; }

        .layout-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 10;
        }

        .sidebar-item {
            padding: 15px 20px;
            border-bottom: 1px solid #34495e;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
            font-size: 0.95rem;
        }

        .sidebar-item:hover {
            background-color: #1abc9c;
        }

        .flyout-menu {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            background-color: #34495e;
            min-width: 200px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            flex-direction: column;
        }

        .sidebar-item.has-flyout:hover .flyout-menu {
            display: flex;
        }

        .flyout-item {
            padding: 15px 20px;
            border-bottom: 1px solid #2c3e50;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        .flyout-item:hover {
            background-color: #16a085;
        }

        .param-badge {
            display: block;
            font-size: 0.75rem;
            color: #f1c40f;
            margin-top: 5px;
        }

        .content {
            flex-grow: 1;
            padding: 40px;
            text-align: center;
            color: #555;
            background-color: #eef2f5;
            overflow-y: auto;
        }

        #future-dev-container {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #fff;
            border: 1px dashed #ccc;
            border-radius: 8px;
            color: #888;
        }
    </style>
</head>

        const t = uiTranslations[selectedLang] || uiTranslations["en"];

        document.getElementById('welcome-text').innerText = t.welcome;
        document.getElementById('return-text').innerText = t.return;

        function updateTime() {
            const now = new Date();
            const utcTime = now.getTime() + (now.getTimezoneOffset() * 60000);
            const targetTime = new Date(utcTime + (parseFloat(selectedUtc) * 3600000));
            
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit' };
            const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            
            const dateStr = targetTime.toLocaleDateString(t.dateFormat, dateOptions);
            const timeStr = targetTime.toLocaleTimeString(t.dateFormat, timeOptions);

            document.getElementById('local-time-display').innerText = `${dateStr} ${timeStr}`;
        }

        updateTime();
        setInterval(updateTime, 1000);

        let msgTimeout;
        function showTempMessage(msgText) {
            const msgBox = document.getElementById('toolbar-msg');
            msgBox.innerText = msgText;
            if (msgTimeout) clearTimeout(msgTimeout);
            msgTimeout = setTimeout(() => { msgBox.innerText = ""; }, 6000);
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            let sidebarHTML = `
                <div class="sidebar-item has-flyout">
                    ${t.genInfo}
                    <div class="flyout-menu">
                        <div class="flyout-item">${t.m1}</div>
                        <div class="flyout-item">${t.m2}</div>
                        <div class="flyout-item">${t.m3}</div>
                        <div class="flyout-item">${t.m4}</div>
                        <div class="flyout-item">${t.m5}</div>
                        <div class="flyout-item">${t.m6}</div>
                        <div class="flyout-item">${t.m7}</div>
                    </div>
                </div>
            `;

            if (isLoggedIn) {
                const passedParamStr = `L:${selectedLang.toUpperCase()} | U:${selectedUtc}`;
                sidebarHTML += `
                    <div class="sidebar-item has-flyout">
                        ${t.m8}
                        <span class="param-badge">[${passedParamStr}]</span>
                        <div class="flyout-menu">
                            <div class="flyout-item">${t.sub1}</div>
                            <div class="flyout-item">${t.sub2}</div>
                            <div class="flyout-item">${t.sub3}</div>
                            <div class="flyout-item">${t.sub4}</div>
                            <div class="flyout-item">${t.sub5}</div>
                            <div class="flyout-item">${t.sub6}</div>
                        </div>
                    </div>
                `;
            }
            sidebar.innerHTML = sidebarHTML;
        }

        function renderAuthArea() {
            const authArea = document.getElementById('auth-area');
            const returnLink = document.getElementById('return-text');
            const devContainer = document.getElementById('future-dev-container');
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';

            if (isLoggedIn) {
                const loggedUser = localStorage.getItem('loggedInUser');
                authArea.innerHTML = `
                    <span class="username-display">${loggedUser}</span>
                    <button class="btn-logout" onclick="handleLogout()">${t.logout}</button>
                `;
                returnLink.style.display = 'none';
                devContainer.style.display = 'block';
                document.getElementById('dev-param-display').innerText = `TOKEN_${loggedUser.toUpperCase()}_L${selectedLang}_U${selectedUtc}`;
            } else {
                authArea.innerHTML = `
                    <input type="text" id="user-input" placeholder="${t.userPlaceholder}">
                    <input type="password" id="pass-input" placeholder="${t.passPlaceholder}">
                    <button class="btn-login" onclick="handleLogin()">${t.login}</button>
                `;
                returnLink.style.display = 'inline-block';
                devContainer.style.display = 'none';
            }
            renderSidebar();
        }

        function handleLogin() {
            const userInp = document.getElementById('user-input').value;
            const passInp = document.getElementById('pass-input').value;
            if (userInp === "" && passInp === "") {
                showTempMessage(t.msgNone);
            } else if (userInp === "") {
                showTempMessage(t.msgNoUser);
            } else if (passInp === "") {
                showTempMessage(t.msgNoPass);
            } else {
                if (!userDatabase.hasOwnProperty(userInp)) {
                    showTempMessage(t.msgNoAcc);
                } else if (userDatabase[userInp] !== passInp) {
                    showTempMessage(t.msgWrongPass);
                } else {
                    showTempMessage(t.msgSuccess);
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('loggedInUser', userInp);
                    renderAuthArea();
                }
            }
        }

        function handleLogout() {
            localStorage.setItem('isLoggedIn', 'false');
            localStorage.removeItem('loggedInUser');
            window.location.href = 'index.html';
        }

        renderAuthArea();
    </script>
